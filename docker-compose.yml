services:
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: apify_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - apify_net
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: apify_nginx
    restart: unless-stopped
    ports:
      - '8001:80'
    volumes:
      - .:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - apify_net
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: apify_postgres
    restart: unless-stopped
    ports:
      - '5437:5432'
    environment:
      POSTGRES_DB: default
      POSTGRES_USER: default
      POSTGRES_PASSWORD: secret
    volumes:
      - ./.docker/postgres/data:/var/lib/postgresql/data
    networks:
      - apify_net


networks:
  apify_net:
    driver: bridge
